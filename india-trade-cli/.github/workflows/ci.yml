name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 01:00 UTC — runs slow tests (SSE streams, Monte Carlo, etc.)
    - cron: "0 1 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    # Fast tier: skip slow & network tests, run in parallel
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check package builds
        run: |
          pip install build wheel
          python -m build --no-isolation

      - name: Run tests (fast — not network, not slow)
        run: pytest tests/ -v --tb=short -m "not network and not slow" -n auto

  slow-tests:
    # Runs only on schedule (nightly) or manual dispatch — not on every PR
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run slow tests (SSE streams, Monte Carlo, ML training)
        run: pytest tests/ -v --tb=short -m "slow and not network" -n auto

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: macos-app/package-lock.json

      - name: Install frontend dependencies
        working-directory: macos-app
        run: npm ci

      - name: Run frontend tests
        working-directory: macos-app
        run: npm test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .
